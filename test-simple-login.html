<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Login</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .test-item { margin: 15px 0; padding: 15px; background: #f9f9f9; border-left: 4px solid #007bff; border-radius: 4px; }
        input { padding: 8px; width: 100%; box-sizing: border-box; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; margin: 5px 5px 5px 0; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 10px; padding: 10px; background: #f0f0f0; border-radius: 4px; font-family: monospace; white-space: pre-wrap; word-break: break-all; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Test Login System</h1>
        
        <div class="test-item">
            <h3>1. Test API Connection</h3>
            <button onclick="testConnection()">Test Connection to Server</button>
            <div id="connectionResult" class="result"></div>
        </div>

        <div class="test-item">
            <h3>2. Test Login Endpoint</h3>
            <label>Password:</label>
            <input type="password" id="testPassword" value="admin123" />
            <button onclick="testLogin()">Test Login API</button>
            <div id="loginResult" class="result"></div>
        </div>

        <div class="test-item">
            <h3>3. Test Session Persistence</h3>
            <button onclick="checkSession()">Check Session Status</button>
            <div id="sessionResult" class="result"></div>
        </div>

        <div class="test-item">
            <h3>4. Actual Login Form Test</h3>
            <label>Password:</label>
            <input type="password" id="actualPassword" value="admin123" placeholder="admin123" />
            <button onclick="doLogin()">Login & Redirect</button>
            <div id="actualResult" class="result"></div>
        </div>

        <div class="test-item">
            <h3>Browser Info</h3>
            <div class="result" id="browserInfo"></div>
        </div>
    </div>

    <script>
        // Show browser info
        document.getElementById('browserInfo').textContent = 
            'User Agent: ' + navigator.userAgent + '\n' +
            'Current URL: ' + window.location.href + '\n' +
            'Server: 127.0.0.1:8000';

        function testConnection() {
            const resultDiv = document.getElementById('connectionResult');
            resultDiv.textContent = 'Testing...';
            
            fetch('/?action=check_session', {
                credentials: 'same-origin'
            })
                .then(r => {
                    resultDiv.classList.remove('error', 'success');
                    if (r.status === 200) {
                        resultDiv.classList.add('success');
                    } else {
                        resultDiv.classList.add('error');
                    }
                    resultDiv.textContent = '✅ Server responded!\nStatus: ' + r.status;
                    return r.text();
                })
                .then(text => {
                    try {
                        const data = JSON.parse(text);
                        resultDiv.textContent += '\n\nResponse:\n' + JSON.stringify(data, null, 2);
                    } catch (e) {
                        resultDiv.textContent += '\n\nResponse (raw):\n' + text.substring(0, 500);
                    }
                })
                .catch(e => {
                    resultDiv.classList.add('error');
                    resultDiv.textContent = '❌ Error: ' + e.message;
                });
        }

        function testLogin() {
            const resultDiv = document.getElementById('loginResult');
            const password = document.getElementById('testPassword').value;
            resultDiv.textContent = 'Testing login with password: ' + password;
            resultDiv.classList.remove('error', 'success');
            
            fetch('/?action=login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                credentials: 'same-origin',
                body: JSON.stringify({password: password})
            })
            .then(r => {
                resultDiv.classList.remove('error', 'success');
                if (r.status === 200) {
                    resultDiv.classList.add('success');
                } else {
                    resultDiv.classList.add('error');
                }
                resultDiv.textContent = 'Status: ' + r.status;
                return r.text();
            })
            .then(text => {
                try {
                    const data = JSON.parse(text);
                    resultDiv.textContent += '\n\nResponse:\n' + JSON.stringify(data, null, 2);
                } catch (e) {
                    resultDiv.textContent += '\n\nResponse (raw):\n' + text.substring(0, 500);
                }
            })
            .catch(e => {
                resultDiv.classList.add('error');
                resultDiv.textContent = '❌ Error: ' + e.message;
            });
        }

        function checkSession() {
            const resultDiv = document.getElementById('sessionResult');
            resultDiv.textContent = 'Checking session...';
            resultDiv.classList.remove('error', 'success');
            
            fetch('/?action=check_session', {
                credentials: 'same-origin'
            })
            .then(r => {
                resultDiv.classList.add('success');
                return r.text();
            })
            .then(text => {
                try {
                    const data = JSON.parse(text);
                    resultDiv.textContent = 'Session Status:\n' + JSON.stringify(data, null, 2);
                } catch (e) {
                    resultDiv.textContent = 'Response:\n' + text.substring(0, 500);
                }
            })
            .catch(e => {
                resultDiv.classList.add('error');
                resultDiv.textContent = '❌ Error: ' + e.message;
            });
        }

        function doLogin() {
            const resultDiv = document.getElementById('actualResult');
            const password = document.getElementById('actualPassword').value;
            resultDiv.textContent = 'Processing login...';
            resultDiv.classList.remove('error', 'success');
            
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/?action=login', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            
            xhr.onload = function() {
                if (xhr.status === 200) {
                    try {
                        const res = JSON.parse(xhr.responseText);
                        if (res.success) {
                            resultDiv.classList.add('success');
                            resultDiv.textContent = '✅ Login Success!\n' + JSON.stringify(res, null, 2) + '\n\nRedirecting to dashboard in 2 seconds...';
                            setTimeout(() => {
                                window.location.href = '/?view=dashboard';
                            }, 2000);
                        } else {
                            resultDiv.classList.add('error');
                            resultDiv.textContent = '❌ Login Failed:\n' + JSON.stringify(res, null, 2);
                        }
                    } catch (e) {
                        resultDiv.classList.add('error');
                        resultDiv.textContent = '❌ Error parsing response:\n' + e.message + '\n\nRaw response:\n' + xhr.responseText;
                    }
                } else {
                    resultDiv.classList.add('error');
                    resultDiv.textContent = '❌ HTTP Error: ' + xhr.status + '\n' + xhr.responseText;
                }
            };
            
            xhr.onerror = function() {
                resultDiv.classList.add('error');
                resultDiv.textContent = '❌ Network Error';
            };
            
            xhr.send(JSON.stringify({password: password}));
        }
    </script>
</body>
</html>
