<!DOCTYPE html>
<html>
<head>
    <title>Test CRUD Tambah Barang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">
    <div class="container">
        <h1>Test CRUD Tambah Barang</h1>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Test Add Asset</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label>Brand</label>
                            <input type="text" id="brand" class="form-control" value="Lenovo">
                        </div>
                        <div class="mb-3">
                            <label>Model</label>
                            <input type="text" id="model" class="form-control" value="ThinkPad E15">
                        </div>
                        <div class="mb-3">
                            <label>Serial Number</label>
                            <input type="text" id="sn" class="form-control" value="LNV-TEST-001">
                        </div>
                        <div class="mb-3">
                            <label>Category</label>
                            <input type="text" id="category" class="form-control" value="Laptop">
                        </div>
                        <div class="mb-3">
                            <label>Barcode</label>
                            <input type="text" id="barcode" class="form-control" value="">
                        </div>
                        <div class="mb-3">
                            <label>Status</label>
                            <select id="status" class="form-select">
                                <option value="available">Available</option>
                                <option value="borrowed">Borrowed</option>
                                <option value="broken">Broken</option>
                            </select>
                        </div>
                        <button class="btn btn-primary w-100" onclick="testAddAsset()">Test Add Asset</button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Response</h5>
                    </div>
                    <div class="card-body">
                        <pre id="response" style="max-height: 400px; overflow-y: auto; background: #f5f5f5; padding: 10px; border-radius: 4px;">Tunggu response...</pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    async function testAddAsset() {
        const payload = {
            brand: document.getElementById('brand').value,
            model: document.getElementById('model').value,
            serial_number: document.getElementById('sn').value,
            category: document.getElementById('category').value,
            barcode: document.getElementById('barcode').value,
            status: document.getElementById('status').value
        };

        console.log('Sending payload:', payload);
        
        try {
            const response = await fetch('?action=add_asset', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const text = await response.text();
            console.log('Raw response:', text);
            
            document.getElementById('response').textContent = `
Status: ${response.status} ${response.statusText}
Headers: ${JSON.stringify([...response.headers.entries()], null, 2)}

Body:
${text}
`;

            try {
                const data = JSON.parse(text);
                console.log('Parsed JSON:', data);
            } catch (e) {
                console.error('Failed to parse JSON:', e);
            }
        } catch (e) {
            console.error('Error:', e);
            document.getElementById('response').textContent = 'Error: ' + e.message;
        }
    }
    </script>
</body>
</html>
